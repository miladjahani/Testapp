<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بهینه‌ساز و مشاور هوشمند SX-EW</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.6; margin: 20px; background-color: #f4f4f4; color: #333; }
        .container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
        .header-container { display: flex; justify-content: space-between; align-items: center; }
        .theme-switcher { display: flex; align-items: center; cursor: pointer; }
        .theme-switcher span { margin-right: 8px; font-size: 14px; }
        .toggle-switch { position: relative; display: inline-block; width: 40px; height: 20px; background-color: #ccc; border-radius: 20px; transition: background-color 0.3s; }
        .toggle-switch::before { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background-color: white; top: 2px; left: 2px; transition: transform 0.3s; }
        input[type="checkbox"]#theme-toggle { display: none; }
        input[type="checkbox"]:checked + .toggle-switch { background-color: #0056b3; }
        input[type="checkbox"]:checked + .toggle-switch::before { transform: translateX(20px); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; }
        input[type="number"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; direction: ltr; }
        .button-group { display: flex; gap: 10px; grid-column: span 2; }
        button { background-color: #0056b3; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; flex-grow: 1; }
        button:hover { background-color: #004494; }
        button.optimizer { background-color: #28a745; }
        button.optimizer:hover { background-color: #218838; }
        .results-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;}
        .results-box { background-color: #eef7ff; padding: 15px; border-radius: 5px; }
        .results-box h3 { border-color: #6cb2f0; }
        .result-item { margin-bottom: 8px; }
        .notes { grid-column: span 2; margin-top: 15px; font-style: italic; color: #555; background-color: #f8f9fa; padding: 10px; border-left: 4px solid #0056b3; }

        /* Dark Mode Styles */
        body.dark-mode { background-color: #1a1a1a; color: #e0e0e0; }
        .dark-mode .container { background: #2a2a2a; box-shadow: 0 0 15px rgba(255,255,255,0.08); }
        .dark-mode h1, .dark-mode h2, .dark-mode h3 { color: #5d9cec; border-bottom-color: #5d9cec; }
        .dark-mode label { color: #e0e0e0; }
        .dark-mode input[type="number"] { background-color: #3c3c3c; color: #e0e0e0; border: 1px solid #555; }
        .dark-mode button { background-color: #5d9cec; }
        .dark-mode button:hover { background-color: #4a89dc; }
        .dark-mode button.optimizer { background-color: #4CAF50; }
        .dark-mode button.optimizer:hover { background-color: #45a049; }
        .dark-mode .results-box { background-color: #3c3c3c; }
        .dark-mode .results-box h3 { border-color: #5d9cec; }
        .dark-mode .notes { background-color: #3c3c3c; color: #ccc; border-left-color: #5d9cec; }
        .dark-mode .theme-switcher span { color: #e0e0e0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-container">
            <h1>سیستم بهینه‌ساز و مشاور هوشمند SX-EW</h1>
            <label for="theme-toggle" class="theme-switcher">
                <span>حالت تاریک</span>
                <input type="checkbox" id="theme-toggle">
                <div class="toggle-switch"></div>
            </label>
        </div>

        <form id="calculation-form">
            <h2>۱. مشخصات واحد استخراج حلالی (SX)</h2>
            <div class="form-grid">
                <div class="form-group"><label for="pls_flow">دبی PLS (m³/h)</label><input type="number" id="pls_flow" value="210" step="any"></div>
                <div class="form-group"><label for="pls_cu">غلظت مس PLS (g/L)</label><input type="number" id="pls_cu" value="1.74" step="any"></div>
                <div class="form-group"><label for="org_flow">دبی فاز آلی (m³/h)</label><input type="number" id="org_flow" value="221" step="any"></div>
                <div class="form-group"><label for="lean_electrolyte_cu">غلظت مس الکترولیت فقیر (g/L)</label><input type="number" id="lean_electrolyte_cu" value="35.80" step="any"></div>
                <div class="form-group"><label for="num_stages">تعداد مراحل استخراج</label><input type="number" id="num_stages" value="2"></div>
            </div>

            <h2>۲. مشخصات واحد الکترووینینگ (EW)</h2>
            <div class="form-grid">
                <div class="form-group"><label for="current_density">چگالی جریان (A/m²)</label><input type="number" id="current_density" value="79.9" step="any"></div>
                <div class="form-group"><label for="current_efficiency">راندمان جریانی (%)</label><input type="number" id="current_efficiency" value="95" step="any"></div>
                <div class="form-group"><label for="num_cells">تعداد سلول‌ها</label><input type="number" id="num_cells" value="42"></div>
                <div class="form-group"><label for="cathodes_per_cell">کاتدها در هر سلول</label><input type="number" id="cathodes_per_cell" value="30"></div>
                <div class="form-group"><label for="plating_area">سطح هر وجه کاتد (m²)</label><input type="number" id="plating_area" value="1.0" step="any"></div>
            </div>

            <div class="button-group">
                <button type="submit" id="run-base-case">محاسبه سناریو پایه</button>
                <button type="button" id="run-optimizer" class="optimizer">بهینه‌سازی (افزودن یک مرحله استخراج)</button>
            </div>
        </form>

        <div class="results-container" id="results-container"></div>
    </div>

    <script src="js/sx_model.js"></script>
    <script src="js/ew_model.js"></script>
    <script>
        const form = document.getElementById('calculation-form');
        const resultsContainer = document.getElementById('results-container');
        const themeToggle = document.getElementById('theme-toggle');

        // --- Theme Switcher Logic ---
        const applyTheme = (isDark) => {
            document.body.classList.toggle('dark-mode', isDark);
            themeToggle.checked = isDark;
        };

        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDarkMode = savedTheme ? savedTheme === 'dark' : prefersDark;

        applyTheme(isDarkMode);

        themeToggle.addEventListener('change', () => {
            const newTheme = themeToggle.checked ? 'dark' : 'light';
            localStorage.setItem('theme', newTheme);
            applyTheme(themeToggle.checked);
        });
        // --- End Theme Switcher Logic ---

        function runSimulation(isBaseCase) {
            const formData = {
                pls_flow: form.pls_flow.value,
                pls_cu: form.pls_cu.value,
                org_flow: form.org_flow.value,
                lean_electrolyte_cu: form.lean_electrolyte_cu.value,
                num_stages: form.num_stages.value,
                current_density: form.current_density.value,
                current_efficiency: form.current_efficiency.value,
                num_cells: form.num_cells.value,
                cathodes_per_cell: form.cathodes_per_cell.value,
                plating_area: form.plating_area.value,
            };

            const base_sx_results = calculate_sx_performance({...formData, num_stages: form.num_stages.value});
            const base_ew_results = calculate_ew_performance(formData);

            let resultHTML = generateResultBoxHTML('سناریو پایه', base_sx_results, base_ew_results);

            if (!isBaseCase) {
                const optimizedFormData = {...formData, num_stages: parseInt(form.num_stages.value) + 1};
                const opt_sx_results = calculate_sx_performance(optimizedFormData);
                // EW results don't change in this scenario as production is tied to CD, not SX recovery.
                resultHTML += generateResultBoxHTML(`سناریو بهینه (با ${optimizedFormData.num_stages} مرحله استخراج)`, opt_sx_results, base_ew_results);
                resultHTML += generateComparisonNotes(base_sx_results, opt_sx_results);
            }
            resultsContainer.innerHTML = resultHTML;
        }

        function generateResultBoxHTML(title, sx, ew) {
            if (sx.error || ew.error) return `<p style="color: red;">Error: ${sx.error || ew.error}</p>`;
            let stageRaffinates = sx.stage_results.map((r, i) => `مرحله ${i+1}: ${r} g/L`).join('<br>');

            return `<div class="results-box">
                        <h3>${title}</h3>
                        <div class="result-item"><strong>بازیابی کلی SX:</strong> ${sx.sx_recovery}%</div>
                        <div class="result-item"><strong>رافینیت نهایی:</strong> ${sx.raffinate_cu} g/L</div>
                        <div class="result-item"><strong>رافینیت هر مرحله:</strong><br>${stageRaffinates}</div>
                        <div class="result-item"><strong>تولید مس EW:</strong> ${ew.copper_production_tpd} تن در روز</div>
                    </div>`;
        }

        function generateComparisonNotes(base, optimized) {
            const recovery_gain = optimized.sx_recovery - base.sx_recovery;
            const raffinate_reduction = base.raffinate_cu - optimized.raffinate_cu;
            return `<div class="notes">
                        <h3>تحلیل مشاوره‌ای</h3>
                        <p>افزودن یک مرحله استخراج، راندمان کلی را <strong>${recovery_gain.toFixed(2)}%</strong> افزایش داد و مس موجود در رافینیت را <strong>${raffinate_reduction.toFixed(3)} g/L</strong> کاهش داد. این به معنی تولید بیشتر با مقدار PLS یکسان است.</p>
                        <p><strong>تصمیم‌گیری:</strong> آیا هزینه سرمایه‌گذاری و عملیاتی برای افزودن یک مرحله جدید، با توجه به این افزایش راندمان، توجیه‌پذیر است؟</p>
                    </div>`;
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            runSimulation(true);
        });

        document.getElementById('run-optimizer').addEventListener('click', () => {
            runSimulation(false);
        });
    </script>
</body>
</html>
